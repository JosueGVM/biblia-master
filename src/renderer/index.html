<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <title>Biblia Master</title>
    <link rel="stylesheet" href="./css/layout.css">
</head>
<body class="theme-dark">
    <div id="app-container">
        <!-- Sidebar Izquierdo -->
        <aside class="sidebar"><div id="prev-books"></div></aside>

        <!-- Botones Añadir (Nivel intermedio) -->
        <button id="add-version-left" class="side-add-btn" title="Añadir versión">+</button>
        <button id="add-version-right" class="side-add-btn" title="Añadir versión">+</button>

        <main id="main-reader">
            <header id="reader-header">
                
                <div id="header-nav-row">
                    <button id="prev-chapter" class="nav-arrow-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    
                    <div class="header-side-controls" id="header-left-controls">
                        <!-- BOTÓN DEL BUSCADOR -->
                        <button id="btn-open-search" class="minimal-icon-btn" title="Buscar">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                        <!-- ✨ BOTÓN FAVORITOS -->
                        <button id="btn-open-favorites" class="minimal-icon-btn" title="Favoritos">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="star-icon">
                                <polygon points="12 2 15 10 23 10 17 15 19 23 12 18 5 23 7 15 1 10 9 10"></polygon>
                            </svg>
                        </button>
                        <!-- BOTÓN DE HIGHLIGHTS -->
                        <button id="btn-open-highlights" class="minimal-icon-btn" title="Mis Highlights">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 20h9"></path>
                                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                            </svg>
                        </button>
                        <!-- BOTÓN DE NOTAS -->
                        <button id="btn-open-notes" class="minimal-icon-btn" title="Notas">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </button>
                    </div>
                    
                    <div id="header-main-controls">
                        <!-- TÍTULO INTERACTIVO -->
                        <div id="title-interactive">
                            <div id="group-indicator">| SECCIÓN |</div>
                            <div style="display:flex;">
                                <span id="book-name-btn" class="clickable-title">Libro</span>
                                <span id="chapter-num-btn" class="clickable-title">1</span>
                            </div>
                        </div>
                    </div>

                    <div class="header-side-controls" id="header-right-controls">
                        <!-- BOTÓN DE CONFIGURACIÓN -->
                        <button id="settings-btn" class="minimal-icon-btn" title="Configuración">                            
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>        
                        </button>
                    </div>

                    <button id="next-chapter" class="nav-arrow-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

            </header>
            
            <div id="text-columns-container"></div>
        </main>

        <!-- Sidebar Derecho -->
        <aside class="sidebar"><div id="next-books"></div></aside>

        <!-- CAPAS SUPERIORES (Nivel máximo de Z-index) -->
        <div id="search-modal" class="modal-overlay hidden">
            <div id="search-card">
                <div id="search-header-box">
                    <input type="text" id="search-input" placeholder="Buscar palabra exacta...">
                    <button id="search-mode-toggle" class="search-mode-btn" title="Buscar en todas las versiones">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Activas</span>
                    </button>
                    <button id="btn-close-search" class="close-x">✕</button>
                </div>
                <div id="search-status-bar">
                    <h2 id="search-title-display">Resultados</h2>
                    <span id="results-count">0 encontrados</span>
                </div>
                <div id="results-list"></div>
            </div>
        </div>

        <div id="settings-modal" class="modal-overlay hidden">
            <div id="settings-content">
                <h3>Apariencia</h3>
                <div class="setting-item">
                    <label>Tamaño letra: <span id="font-size-value">18px</span></label>
                    <input type="range" id="font-size-slider" min="14" max="40" value="18">
                </div>
                <div class="setting-item">
                    <label>Tipografía</label>
                    <select id="font-family-select" class="custom-select">
                        <option value="'Segoe UI', sans-serif">Moderna (Sans)</option>
                        <option value="'Georgia', serif">Clásica (Serif)</option>
                        <option value="'Charter', serif">Elegante (Charter)</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>Tema</label>
                    <div id="theme-selector-row">
                        <div class="theme-dot light" data-theme="theme-light"></div>
                        <div class="theme-dot dark" data-theme="theme-dark"></div>
                        <div class="theme-dot sepia" data-theme="theme-sepia"></div>
                    </div>
                </div>
                <button id="close-settings" class="btn-primary">Listo</button>
            </div>
        </div>

        <!-- ✨ MODAL DE FAVORITOS -->
        <div id="favorites-modal" class="modal-overlay hidden">
            <div id="favorites-card">
                <div id="favorites-header-box">
                    <h2>⭐ Mis Favoritos</h2>
                    <button id="btn-close-favorites" class="close-x">✕</button>
                </div>
                <div id="favorites-list"></div>
            </div>
        </div>
        <!-- ✨ MODAL DE HIGHLIGHTS -->
        <div id="highlights-modal" class="modal-overlay hidden">
            <div id="highlights-card">
                <div id="highlights-header-box">
                    <h2>🖍️ Mis Highlights</h2>
                    <button id="btn-close-highlights" class="close-x">✕</button>
                </div>
                <div id="highlights-filter-bar">
                    <div class="hl-filter-dot all active" data-color="all" title="Todos"></div>
                    <div class="hl-filter-dot" style="background:#fcf6bd" data-color="#fcf6bd" title="Amarillo"></div>
                    <div class="hl-filter-dot" style="background:#d0f4de" data-color="#d0f4de" title="Verde"></div>
                    <div class="hl-filter-dot" style="background:#ffadad" data-color="#ffadad" title="Rojo"></div>
                    <div class="hl-filter-dot" style="background:#a0c4ff" data-color="#a0c4ff" title="Azul"></div>
                </div>
                <div id="highlights-list"></div>
            </div>
        </div>
        <!-- ✨ MODAL DE NOTAS -->
        <div id="notes-modal" class="modal-overlay hidden">
            <div id="search-card">
                <div id="notes-header-box">
                    <h2 style="color: var(--accent); font-weight: 800;">📝 Mis Notas</h2>
                    <button id="btn-close-notes" class="close-x">✕</button>
                </div>
                <div id="notes-list" style="flex: 1; overflow-y: auto; padding: 20px 30px;">
                            <!-- Las notas guardadas se mostraran aquí -->
                </div>
            </div>
        </div>

        <!-- MODAL PARA ESCRIBIR NOTA -->
        <div id="note-editor-modal" class="modal-overlay hidden">
            <div id="settings-content" style="width: 450px;">
                <h3 id="note-editor-title" style="margin-bottom: 15px; color: var(--accent);">Escribir Nota</h3>
                <p id="note-editor-ref" style="font-size: 0.85rem; margin-bottom: 10px; opacity: 0.7;"></p>
                <textarea id="note-textarea" placeholder="Escribe tu reflexión aquí..." style="width: 100%; height: 150px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 8px; outline: none; font-family: inherit; resize: none;"></textarea>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button id="btn-save-note" class="btn-primary" style="margin-top: 0; flex: 2;">Guardar Nota</button>
                    <button id="btn-cancel-note" class="btn-primary" style="margin-top: 0; flex: 1; background: var(--bg-input); color: var(--text-main);">Cancelar</button>
                </div>
            </div>
        </div>

        <div id="action-toolbar" class="hidden">
            <div id="selected-info">0</div>
            <div class="action-buttons-group">
                <button id="action-copy" title="Copiar">📋</button>
                <button id="action-note" title="Nota">📝</button>
                <button id="action-fav" title="Favorito">⭐</button>
                <div class="color-grid">
                    <div class="btn-color c1" data-color="#fcf6bd"></div>
                    <div class="btn-color c2" data-color="#d0f4de"></div>
                    <div class="btn-color c3" data-color="#ffadad"></div>
                    <div class="btn-color c4" data-color="#a0c4ff"></div>
                    <button class="btn-color-clear">🚫</button>
                </div>
                <button id="action-cancel" class="close-x">✕</button>
            </div>
        </div>
    </div>

    <!-- CAPA INICIAL: SELECCIÓN DE VERSIÓN -->
    <div id="startup-modal" class="modal-overlay">
        <div id="startup-box">
            <h2 style="margin-bottom: 10px; font-weight: 800; font-size: 1.8rem;">Bienvenido</h2>
            <p style="margin-bottom: 25px; color: var(--text-muted); font-size: 0.95rem;">Selecciona una versión de la Biblia para comenzar la lectura:</p>
            <div id="startup-version-list">
                <!-- Los botones se generarán aquí -->
            </div>
        </div>
    </div>

    <script src="./bibleData.js"></script>
    <script src="./renderer.js"></script>
</body>
</html>
