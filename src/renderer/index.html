<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <title>Biblia Master</title>
    <link rel="stylesheet" href="./css/layout.css">
</head>
<body class="theme-dark">
    <div id="app-container">
        <!-- Sidebar Izquierdo -->
        <aside class="sidebar"><div id="prev-books"></div></aside>

        <main id="main-reader">
            <header id="reader-header">
                <!-- Fila Superior: Buscador y Botones Centrados -->
                <div id="header-top-row">
                    <div id="search-box">
                        <input type="text" id="search-input" placeholder="Buscar...">
                        <button id="search-btn">🔍</button>
                    </div>
                    <button id="settings-btn" title="Apariencia">⚙️</button>
                    <button class="btn-add" id="add-version" title="Añadir versión">+</button>
                </div>

                <!-- Fila Inferior: Título Centrado -->
                <div id="header-bottom-row">
                    <h1 id="current-title">Génesis 1</h1>
                </div>
            </header>
            
            <div id="text-columns-container"></div>

            <!-- BARRA FLOTANTE DE ACCIONES (Aparece al seleccionar versículos) -->
            <div id="action-toolbar" class="hidden">
                <div id="selected-info">0 seleccionados</div>
                <div class="action-buttons">
                    <button id="action-copy" title="Copiar con referencia">📋</button>
                    <button id="action-fav" title="Añadir a favoritos">⭐</button>
                    <button id="action-note" title="Añadir nota">📝</button>
                    <div class="color-picker">
                        <button class="btn-color yellow" data-color="#ffd700"></button>
                        <button class="btn-color green" data-color="#90ee90"></button>
                        <button class="btn-color pink" data-color="#ffb6c1"></button>
                        <button class="btn-color-clear" title="Quitar marca">🚫</button>
                    </div>
                    <button id="action-cancel">✕</button>
                </div>
            </div>

            <!-- Panel de Búsqueda -->
            <div id="search-results-container" class="hidden">
                <div id="search-results-header">
                    <span id="results-count">0 resultados</span>
                    <button id="close-search">Volver ✕</button>
                </div>
                <div id="results-list"></div>
            </div>

            <!-- Modal de Configuración -->
            <div id="settings-modal" class="hidden">
                <div id="settings-content">
                    <h2>Configuración</h2>
                    <div class="setting-item">
                        <label>Tamaño de letra: <span id="font-size-value">18px</span></label>
                        <input type="range" id="font-size-slider" min="14" max="35" value="18">
                    </div>
                    <div class="setting-item">
                        <label>Tipografía</label>
                        <select id="font-family-select" class="custom-select">
                            <option value="'Segoe UI', sans-serif">Moderna (Sans)</option>
                            <option value="'Georgia', serif">Clásica (Serif)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>Tema visual</label>
                        <div id="theme-selector">
                            <div class="theme-dot light" data-theme="theme-light"></div>
                            <div class="theme-dot dark" data-theme="theme-dark"></div>
                            <div class="theme-dot sepia" data-theme="theme-sepia"></div>
                        </div>
                    </div>
                    <button id="close-settings" class="btn-primary">Cerrar y guardar</button>
                </div>
            </div>
        </main>

        <!-- Sidebar Derecho -->
        <aside class="sidebar"><div id="next-books"></div></aside>
    </div>

    <script src="./bibleData.js"></script>
    <script src="./renderer.js"></script>
</body>
</html>
