<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <title>Biblia Master</title>
    <link rel="stylesheet" href="./css/layout.css">
</head>
<body class="theme-dark">
    <div id="app-container">
        <!-- Barra Lateral Izquierda -->
        <aside class="sidebar"><div id="prev-books"></div></aside>

        <!-- Lector Central -->
        <main id="main-reader">
            <header id="reader-header">
                <div id="header-top">
                    <!-- TÍTULO EN GRANDE Y NEGRITAS -->
                    <h1 id="current-title">Génesis 1</h1>
                    
                    <div id="header-actions">
                        <div id="search-box">
                            <input type="text" id="search-input" placeholder="Buscar...">
                            <button id="search-btn">🔍</button>
                        </div>
                        <button id="settings-btn" title="Configuración">⚙️</button>
                    </div>
                </div>
                <div id="version-controls">
                    <button class="btn-add" id="add-version">+ Añadir Versión</button>
                </div>
            </header>
            
            <div id="text-columns-container"></div>

            <!-- PANEL DE BÚSQUEDA -->
            <div id="search-results-container" class="hidden">
                <div id="search-results-header">
                    <span id="results-count">0 resultados</span>
                    <button id="close-search">Cerrar ✕</button>
                </div>
                <div id="results-list"></div>
            </div>

            <!-- MODAL DE CONFIGURACIÓN -->
            <div id="settings-modal" class="hidden">
                <div id="settings-content">
                    <h2>Apariencia</h2>
                    <div class="setting-item">
                        <label>Tamaño de letra: <span id="font-size-value">18px</span></label>
                        <input type="range" id="font-size-slider" min="14" max="35" value="18">
                    </div>
                    <div class="setting-item">
                        <label>Tipografía</label>
                        <select id="font-family-select">
                            <option value="'Segoe UI', sans-serif">Moderna (Sans)</option>
                            <option value="'Georgia', serif">Clásica (Serif)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>Tema</label>
                        <div id="theme-selector">
                            <div class="theme-dot light" data-theme="theme-light"></div>
                            <div class="theme-dot dark" data-theme="theme-dark"></div>
                            <div class="theme-dot sepia" data-theme="theme-sepia"></div>
                        </div>
                    </div>
                    <button id="close-settings">Aplicar</button>
                </div>
            </div>
        </main>

        <!-- Barra Lateral Derecha -->
        <aside class="sidebar"><div id="next-books"></div></aside>
    </div>

    <script src="./bibleData.js"></script>
    <script src="./renderer.js"></script>
</body>
</html>
