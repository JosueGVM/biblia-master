<!-- ✨ LECTOR FLOTANTE -->
<div id="floating-reader" class="hidden">
    <div id="floating-reader-titlebar">
        <div id="floating-reader-nav">
            <button id="fr-prev" class="fr-nav-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <div id="fr-title">
                <span id="fr-book-btn" class="fr-clickable">Génesis</span>
                <span id="fr-chapter-btn" class="fr-clickable">1</span>
            </div>
            <button id="fr-next" class="fr-nav-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
        <div id="floating-reader-actions">
            <button id="fr-sync-btn" class="fr-action-btn" title="Sincronizar con lector principal">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 .49-3.49"></path>
                </svg>
            </button>
            <button id="fr-close" class="fr-action-btn">✕</button>
        </div>
    </div>
    <div id="floating-reader-version-bar">
        <select id="fr-version-select" class="version-select"></select>
    </div>
    <div id="floating-reader-content"></div>
</div>
