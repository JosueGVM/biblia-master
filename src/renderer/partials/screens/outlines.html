<!-- ✨ PANTALLA DE BOSQUEJOS -->
<div id="outlines-screen" class="fullscreen-overlay hidden">

    <!-- VISTA: LISTA DE BOSQUEJOS -->
    <div id="outlines-list-view">
        <div id="outlines-list-header">
            <h1>📋 Mis Bosquejos</h1>
            <div id="outlines-header-actions">
                <button id="btn-new-outline" class="btn-primary" style="margin-top:0; width:auto; padding: 10px 20px;">+ Nuevo Bosquejo</button>
                <button id="btn-close-outlines" class="close-x" style="width:36px; height:36px; font-size:1rem;">✕</button>
            </div>
        </div>
        <div id="outlines-grid"></div>
    </div>

    <!-- VISTA: SELECTOR DE TIPO -->
    <div id="outlines-type-selector" class="hidden">
        <div id="type-selector-card">
            <h2>¿Qué tipo de bosquejo?</h2>
            <p>Selecciona la estructura que quieres usar</p>
            <div id="type-options">
                <div class="type-option" data-type="full">
                    <div class="type-option-icon">📖</div>
                    <h3>Homilético Completo</h3>
                    <p>Título, tema, propósitos, base bíblica, introducción, puntos principales y conclusión</p>
                </div>
                <div class="type-option" data-type="simple">
                    <div class="type-option-icon">📝</div>
                    <h3>Sencillo</h3>
                    <p>Base bíblica y puntos principales</p>
                </div>
                <div class="type-option" data-type="free">
                    <div class="type-option-icon">✏️</div>
                    <h3>Libre</h3>
                    <p>Editor de texto sin estructura predefinida</p>
                </div>
            </div>
            <button id="btn-cancel-type" class="btn-small-action" style="margin-top: 20px;">Cancelar</button>
        </div>
    </div>

    <!-- VISTA: EDITOR -->
    <div id="outlines-editor-view" class="hidden">
        <div id="editor-header">
            <button class="btn-open-floating-reader btn-small-action" title="Lector flotante">📖 Lector</button>
            <button id="btn-back-outlines" class="btn-small-action">← Volver</button>
            <input type="text" id="outline-title-input" placeholder="Título del bosquejo..." class="outline-title-input">
            <div id="editor-header-actions">
                <button id="btn-export-outline-pdf" class="btn-small-action">📄 Exportar PDF</button>
                <button id="btn-save-outline" class="btn-primary" style="margin-top:0; width:auto; padding: 8px 20px;">Guardar</button>
            </div>
        </div>

        <!-- EDITOR: HOMILÉTICO COMPLETO -->
        <div id="editor-full" class="editor-form hidden">
            <div class="outline-section">
                <label class="outline-label">II. TEMA</label>
                <textarea class="outline-textarea" id="full-theme" placeholder="Tema del sermón..."></textarea>
            </div>
            <div class="outline-section two-col">
                <div>
                    <label class="outline-label">III. PROPÓSITO GENERAL</label>
                    <textarea class="outline-textarea" id="full-general-purpose" placeholder="Propósito general..."></textarea>
                </div>
                <div>
                    <label class="outline-label">IV. PROPÓSITO ESPECÍFICO</label>
                    <textarea class="outline-textarea" id="full-specific-purpose" placeholder="Propósito específico..."></textarea>
                </div>
            </div>
            <div class="outline-section">
                <label class="outline-label">V. BASE BÍBLICA</label>
                <textarea class="outline-textarea" id="full-bible-base" placeholder="Ej: Juan 3:16 — RVR1960 &quot;Porque de tal manera amó Dios...&quot;"></textarea>
            </div>
            <div class="outline-section">
                <label class="outline-label">VI. INTRODUCCIÓN</label>
                <textarea class="outline-textarea tall" id="full-introduction" placeholder="Introducción del sermón..."></textarea>
            </div>
            <div class="outline-section two-col">
                <div>
                    <label class="outline-label">VII. INTERROGANTE SERMONARIA</label>
                    <textarea class="outline-textarea" id="full-sermon-question" placeholder="¿Pregunta central del sermón?"></textarea>
                </div>
                <div>
                    <label class="outline-label">VIII. PROPOSICIÓN</label>
                    <textarea class="outline-textarea" id="full-proposition" placeholder="Proposición..."></textarea>
                </div>
            </div>
            <div class="outline-section two-col">
                <div>
                    <label class="outline-label">IX. ORACIÓN DE TRANSICIÓN</label>
                    <textarea class="outline-textarea" id="full-transition-prayer" placeholder="Oración de transición..."></textarea>
                </div>
                <div>
                    <label class="outline-label">X. PALABRA CLAVE</label>
                    <input type="text" class="outline-input" id="full-key-word" placeholder="Palabra clave...">
                </div>
            </div>

            <!-- PUNTOS PRINCIPALES -->
            <div class="outline-section">
                <div class="points-header">
                    <label class="outline-label">XI. CONTENIDO — PUNTOS PRINCIPALES</label>
                    <button id="btn-add-point-full" class="btn-small-action">+ Agregar punto</button>
                </div>
                <div id="points-list-full"></div>
            </div>
            <!-- CONCLUSIÓN -->
            <div class="outline-section">
                <label class="outline-label">XII. CONCLUSIÓN</label>
                <div class="conclusion-grid">
                    <div>
                        <label class="outline-sublabel">A. Recapitulación</label>
                        <textarea class="outline-textarea" id="full-conclusion-recap" placeholder="Resumen de los puntos principales..."></textarea>
                    </div>
                    <div>
                        <label class="outline-sublabel">B. Aplicación</label>
                        <textarea class="outline-textarea" id="full-conclusion-application" placeholder="Aplicación práctica..."></textarea>
                    </div>
                    <div>
                        <label class="outline-sublabel">C. Invitación</label>
                        <textarea class="outline-textarea" id="full-conclusion-invitation" placeholder="Les invito a que nos unamos en oración..."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- EDITOR: SENCILLO -->
        <div id="editor-simple" class="editor-form hidden">
            <div class="outline-section">
                <label class="outline-label">BASE BÍBLICA</label>
                <textarea class="outline-textarea" id="simple-bible-base" placeholder="Ej: Juan 3:16..."></textarea>
            </div>
            <div class="outline-section">
                <div class="points-header">
                    <label class="outline-label">PUNTOS PRINCIPALES</label>
                    <button id="btn-add-point-simple" class="btn-small-action">+ Agregar punto</button>
                </div>
                <div id="points-list-simple"></div>
            </div>
        </div>

        <!-- EDITOR: LIBRE -->
        <div id="editor-free" class="editor-form hidden">
            <div class="outline-section" style="flex:1; display:flex; flex-direction:column;">
                <label class="outline-label">CONTENIDO</label>
                <textarea class="outline-textarea free-editor" id="free-content" placeholder="Escribe tu bosquejo libremente..."></textarea>
            </div>
        </div>
    </div>
</div>
