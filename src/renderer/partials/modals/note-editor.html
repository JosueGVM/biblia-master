<!-- MODAL PARA EDITAR NOTA -->
<div id="note-editor-modal" class="modal-overlay hidden">
    <div id="settings-content" style="width: 450px;">
        <h3 id="note-editor-title" style="margin-bottom: 15px; color: var(--accent);">Escribir Nota</h3>
        <p id="note-editor-ref" style="font-size: 0.85rem; margin-bottom: 10px; opacity: 0.7;"></p>
        <textarea id="note-textarea" placeholder="Escribe tu reflexión aquí..." style="width: 100%; height: 150px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 8px; outline: none; font-family: inherit; resize: none;"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="btn-save-note" class="btn-primary" style="margin-top: 0; flex: 2;">Guardar Nota</button>
            <button id="btn-cancel-note" class="btn-primary" style="margin-top: 0; flex: 1; background: var(--bg-input); color: var(--text-main);">Cancelar</button>
        </div>
    </div>
</div>
